        style={{ padding: "6px 14px", fontSize: 12, fontFamily: T.disp, letterSpacing: "0.06em", textTransform: "uppercase", fontWeight: 600, cursor: "pointer",
          border: "none", borderRight: `1px solid ${T.line}`,
          background: value === k ? T.teal : "#fff", color: value === k ? "#fff" : T.inkSoft }}>{label}</button>
    ))}
  </div>
);
const Card = ({ title, children, right }) => (
  <div style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 4, padding: 18, marginBottom: 14 }}>
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12, borderBottom: `2px solid ${T.ink}`, paddingBottom: 8 }}>
      <div style={{ fontFamily: T.disp, fontSize: 17, fontWeight: 700, letterSpacing: "0.05em", textTransform: "uppercase", color: T.ink }}>{title}</div>
      {right}
    </div>
    {children}
  </div>
);
const Row = ({ label, val, bold, color, indent, sub }) => (
  <div style={{ display: "flex", justifyContent: "space-between", padding: sub ? "3px 0" : "6px 0",
    borderBottom: bold ? "none" : `1px solid ${T.line}`, borderTop: bold ? `2px solid ${T.ink}` : "none",
    paddingLeft: indent ? 14 : 0 }}>
    <span style={{ fontSize: sub ? 12 : 13.5, color: bold ? T.ink : T.inkSoft, fontWeight: bold ? 700 : 400, fontFamily: T.body }}>{label}</span>
    <span style={{ fontFamily: T.mono, fontSize: sub ? 12 : 13.5, fontWeight: bold ? 700 : 500, color: color || T.ink }}>{val}</span>
  </div>
);

/* ================= MAIN APP ================= */
function App() {
  const [view, setView] = useState("analyzer");
  const [step, setStep] = useState(0);
  const [deal, setDeal] = useState({ ...DEFAULT_DEAL });
  const [rows, setRows] = useState(buildRows);
  const [adders, setAdders] = useState({ location: 0, contingency: 0, ohp: 0, laborTax: 0, matTax: 0 });
  const [estTab, setEstTab] = useState("Exteriors");
  const [openCats, setOpenCats] = useState({});
  const [saved, setSaved] = useState([]);
  const [saveName, setSaveName] = useState("");
  const [importText, setImportText] = useState("");
  const [toast, setToast] = useState("");

  const D = (k, v) => setDeal((d) => ({ ...d, [k]: v }));
  const flash = (m) => { setToast(m); setTimeout(() => setToast(""), 2500); };

  /* ---- estimator math ---- */
  const est = useMemo(() => {
    const active = rows.filter((r) => num(r.qty) > 0);
    const labor = active.reduce((s, r) => s + num(r.qty) * num(r.labor), 0);
    const material = active.reduce((s, r) => s + num(r.qty) * num(r.material), 0);
    const subtotal = labor + material;
    const adderAmt = subtotal * (num(adders.location) + num(adders.contingency) + num(adders.ohp)) / 100
      + labor * num(adders.laborTax) / 100 + material * num(adders.matTax) / 100;
    const byTab = {};
    Object.keys(LIB).forEach((t) => {
      const a = active.filter((r) => r.tab === t);
      byTab[t] = { labor: a.reduce((s, r) => s + num(r.qty) * num(r.labor), 0), material: a.reduce((s, r) => s + num(r.qty) * num(r.material), 0) };
    });
    return { labor, material, subtotal, adderAmt, grand: subtotal + adderAmt, byTab, count: active.length };
  }, [rows, adders]);

  /* ---- analyzer math ---- */
  const calc = useMemo(() => {
    const arv = num(deal.arv), purchase = num(deal.purchase), sqft = num(deal.sqft);
    const repair = deal.repairMode === "lump" ? num(deal.repairLump)
      : deal.repairMode === "psf" ? num(deal.repairPSF) * sqft : est.grand;
    const holdMonths = num(deal.renoMonths) + num(deal.salesMonths);

    const costsFor = (p, A = arv, R = repair, HM = holdMonths, RM = num(deal.renoMonths)) => {
      const buying = deal.buyMode === "pct" ? p * num(deal.buyPct) / 100 : num(deal.buyLump);
      const holding = deal.holdMode === "permonth" ? num(deal.holdPerMonth) * HM : num(deal.holdLump);
      const selling = deal.sellMode === "pct" ? A * num(deal.sellPct) / 100 : num(deal.sellLump);
      let loanP = 0, loanR = 0, loan = 0;
      if (deal.finStrategy === "loan") {
        if (deal.loanBasis === "lump") loan = num(deal.loanLump);
        else if (deal.loanBasis === "purchase") { loanP = p * num(deal.ltvP) / 100; loan = loanP; }
        else if (deal.loanBasis === "repairs") { loanR = R * num(deal.ltvR) / 100; loan = loanR; }
        else if (deal.loanBasis === "both") { loanP = p * num(deal.ltvP) / 100; loanR = R * num(deal.ltvR) / 100; loan = loanP + loanR; }
        else if (deal.loanBasis === "arv") loan = A * num(deal.ltvArv) / 100;
      }
      const mRate = num(deal.rate) / 100 / 12;
      const finMonths = deal.finMonthsAuto ? HM : num(deal.finMonths) + Math.max(0, HM - holdMonths);
      let interest = 0;
      if (deal.finStrategy === "loan") {
        if (deal.interestSchedule === "holdback" && deal.loanBasis === "both") {
          interest = loanP * mRate * finMonths + loanR * mRate * (RM / 2 + (HM - RM));
        } else interest = loan * mRate * finMonths;
      }
      const pts = deal.finStrategy === "loan" ? loan * num(deal.points) / 100 : 0;
      const other = deal.finStrategy === "loan" ? loan * num(deal.otherPct) / 100 : 0;
      const financing = interest + pts + other;
      return { buying, holding, selling, financing, interest, pts, other, loan,
        monthly: deal.finStrategy === "loan" ? loan * mRate : 0 };
    };

    const c = costsFor(purchase);
    const profit = arv - purchase - repair - c.buying - c.holding - c.selling - c.financing;
    const allCosts = purchase + repair + c.buying + c.holding + c.selling + c.financing;
    const upfront = purchase + repair + c.buying + c.holding + c.interest + c.pts + c.other;
    const cashNeeded = Math.max(upfront - c.loan, 0);
    const cocr = cashNeeded > 0 ? profit / cashNeeded : Infinity;
    const annCocr = holdMonths > 0 ? cocr * 12 / holdMonths : 0;
    const rule70 = arv > 0 ? (purchase + repair) / arv : 0;

    /* MAO: iteratively solve purchase so profit == desired (recalcs %-of-purchase buying + loan costs) */
    const desired = deal.profitMode === "pct" ? arv * num(deal.profitPct) / 100 : num(deal.profitLump);
    let mao = purchase;
    for (let i = 0; i < 25; i++) {
      const k = costsFor(mao);
      mao = arv - desired - repair - k.buying - k.holding - k.selling - k.financing;
    }

    /* FlipperForce-style MPP: costs held at current purchase price (matches their report) */
    const mppStatic = arv - desired - repair - c.buying - c.holding - c.selling - c.financing;

    /* Floor logic (Chandler's rule):
       Base target = greater of $50K or 20% of ARV — the deal must clear this as analyzed.
       Storm floor = walk-away when everything runs over. $35K normally, but $50K if
       all-in (purchase + rehab) tops $250K, since hard money gets expensive fast on
       bigger deals and the cushion has to be bigger. */
    const allIn = purchase + repair;
    const baseTarget = Math.max(50000, 0.2 * arv);
    const stormFloor = allIn > 250000 ? 50000 : 35000;

    const profitAt = (A, R, HM, RM) => { const k = costsFor(purchase, A, R, HM, RM); return A - purchase - R - k.buying - k.holding - k.selling - k.financing; };
    const rm0 = num(deal.renoMonths);
    const stress = [
      { name: "Base case", profit: profitAt(arv, repair, holdMonths, rm0), floor: baseTarget },
      { name: "ARV drops 5%", profit: profitAt(arv * 0.95, repair, holdMonths, rm0), floor: stormFloor },
      { name: "Rehab runs 15% over", profit: profitAt(arv, repair * 1.15, holdMonths, rm0), floor: stormFloor },
      { name: "Timeline slips 2 months", profit: profitAt(arv, repair, holdMonths + 2, rm0 + 2), floor: stormFloor },
      { name: "Perfect storm (all three)", profit: profitAt(arv * 0.95, repair * 1.15, holdMonths + 2, rm0 + 2), floor: stormFloor },
    ].map((s) => ({ ...s, passes: s.profit >= s.floor }));

    /* RF rule: every $1K rehab ≈ 1 work day (~21 work days/month) */
    const rehabDays = Math.round(repair / 1000);
    const suggReno = repair > 0 ? Math.max(0.5, Math.ceil((rehabDays / 21) * 2) / 2) : 0;

    const basePass = profit >= baseTarget;
    const stormPass = stress[4].profit >= stormFloor;
    const verdict = !basePass ? "below" : (stormPass ? "clears" : "thin");
    const passes = basePass; /* legacy alias */
    return { arv, purchase, repair, holdMonths, ...c, profit, allCosts, cashNeeded, cocr, annCocr, rule70, mao, mppStatic, desired, passes, baseTarget, stormFloor, allIn, basePass, stormPass, verdict, stress, rehabDays, suggReno };
  }, [deal, est]);

  /* ---- persistence ---- */
  const refreshSaved = async () => {
    try { const r = await storageShim.get("rf-deals"); setSaved(r ? JSON.parse(r.value) : []); }
    catch { setSaved([]); }
  };
  useEffect(() => { refreshSaved(); }, []);

  const saveDeal = async () => {
    const name = saveName.trim() || deal.address.trim() || "Untitled deal";
    try {
      let list = [];
      try { const r = await storageShim.get("rf-deals"); list = r ? JSON.parse(r.value) : []; } catch {}
      const payload = { name, savedAt: new Date().toISOString(), deal, adders,
        estRows: rows.filter((r) => num(r.qty) > 0 || r.custom).map(({ id, ...rest }) => rest) };
      const idx = list.findIndex((x) => x.name === name);
      if (idx >= 0) list[idx] = payload; else list.push(payload);
      await storageShim.set("rf-deals", JSON.stringify(list));
      setSaved(list); flash(`Saved "${name}"`);
    } catch { flash("Save failed — storage unavailable"); }
  };
  const loadDeal = (p) => {
    setDeal({ ...DEFAULT_DEAL, ...p.deal });
    setAdders({ location: 0, contingency: 0, ohp: 0, laborTax: 0, matTax: 0, ...p.adders });
    const base = buildRows();
    (p.estRows || []).forEach((s) => {
      const m = base.find((b) => b.tab === s.tab && b.cat === s.cat && b.desc === s.desc);
      if (m) { m.qty = s.qty; m.labor = s.labor; m.material = s.material; }
      else base.push({ ...s, id: ++rid });
    });
    setRows(base); setView("analyzer"); setStep(0); flash(`Loaded "${p.name}"`);
  };
  const deleteDeal = async (name) => {
    try {
      const list = saved.filter((x) => x.name !== name);
      await storageShim.set("rf-deals", JSON.stringify(list));
      setSaved(list); flash(`Deleted "${name}"`);
    } catch { flash("Delete failed"); }
  };

  const importDeal = () => {
    try {
      const p = JSON.parse(importText);
      if (!p.deal) throw new Error("missing deal");
      loadDeal({ name: p.name || p.deal.address || "Imported deal", ...p });
      setImportText("");
    } catch { flash("Couldn't parse — paste the full JSON block from Claude"); }
  };
  const exportDeal = async () => {
    const payload = { name: deal.address || "Exported deal", deal, adders,
      estRows: rows.filter((r) => num(r.qty) > 0 || r.custom).map(({ id, ...rest }) => rest) };
    const text = JSON.stringify(payload, null, 1);
    try { await navigator.clipboard.writeText(text); flash("Deal JSON copied — paste it to Claude"); }
    catch { setImportText(text); flash("Clipboard blocked — JSON placed in the import box, copy from there"); }
  };

  const setRow = (id, k, v) => setRows((rs) => rs.map((r) => (r.id === id ? { ...r, [k]: v } : r)));
  const addCustomRow = (tab, cat) =>
    setRows((rs) => [...rs, { id: ++rid, tab, cat, desc: "Custom item", unit: "each", qty: 0, labor: 0, material: 0, custom: true }]);

  const STEPS = ["ARV", "Purchase", "Repair Costs", "Fixed Costs", "Financing", "Profit"];

  /* ================= RENDER ================= */
  return (
    <div style={{ minHeight: "100vh", background: T.paper, fontFamily: T.body, color: T.ink }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=IBM+Plex+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap');
        input[type=number]::-webkit-inner-spin-button{opacity:.4}
        button:focus-visible,input:focus-visible{outline:2px solid ${T.teal};outline-offset:1px}
        @media print{
          .no-print{display:none!important}
          body{background:#fff!important}
          *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
        }`}</style>

      {/* HEADER */}
      <div className="no-print" style={{ background: T.ink, color: "#fff", padding: "14px 22px", display: "flex", alignItems: "center", gap: 22, flexWrap: "wrap" }}>
        <div>
          <div style={{ fontFamily: T.disp, fontSize: 22, fontWeight: 700, letterSpacing: "0.12em", textTransform: "uppercase", lineHeight: 1 }}>Chandler Biggs</div>
          <div style={{ fontFamily: T.mono, fontSize: 11, color: "#9FB2C1", letterSpacing: "0.08em" }}>FLIP ANALYZER + REPAIR ESTIMATOR</div>
        </div>
        <div style={{ display: "flex", gap: 2, marginLeft: "auto", alignItems: "center" }}>
          {[["analyzer", "Flip Analyzer"], ["estimator", "Repair Estimator"], ["review", "Review"], ["saved", `Saved Deals (${saved.length})`]].map(([k, l]) => (
            <button key={k} onClick={() => setView(k)}
              style={{ padding: "9px 16px", fontFamily: T.disp, fontSize: 14, fontWeight: 600, letterSpacing: "0.07em", textTransform: "uppercase",
                cursor: "pointer", border: "none", borderRadius: 3,
                background: view === k ? T.teal : "transparent", color: view === k ? "#fff" : "#9FB2C1" }}>{l}</button>
          ))}
          <button onClick={() => { setView("review"); setTimeout(() => window.print(), 350); }}
            style={{ marginLeft: 10, padding: "9px 16px", fontFamily: T.disp, fontSize: 14, fontWeight: 600, letterSpacing: "0.07em", textTransform: "uppercase",
              cursor: "pointer", border: "none", borderRadius: 3, background: "#fff", color: T.ink }}>🖨 Print Report</button>
        </div>
      </div>

      {toast && <div style={{ position: "fixed", top: 70, right: 20, background: T.ink, color: "#fff", padding: "10px 16px", borderRadius: 4, fontFamily: T.mono, fontSize: 13, zIndex: 50 }}>{toast}</div>}

      <div style={{ display: "flex", gap: 16, padding: 16, alignItems: "flex-start", flexWrap: "wrap" }}>
        {/* ============ LEFT: content ============ */}
        <div style={{ flex: "1 1 560px", minWidth: 340 }}>

          {view === "analyzer" && (
            <>
              {/* deal identity */}
              <Card title="Deal" right={
                <button onClick={() => { setDeal({ ...RF_PRESET }); setStep(0); flash("New deal — River Forged defaults loaded"); }}
                  style={{ padding: "6px 12px", borderRadius: 3, border: "none", background: T.teal, color: "#fff", cursor: "pointer", fontFamily: T.disp, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.05em", fontSize: 12 }}>
                  + New Deal — RF Defaults</button>}>
                <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 12 }}>
                  <div><Lbl>Property address</Lbl>
                    <input value={deal.address} onChange={(e) => D("address", e.target.value)} placeholder="123 Main St"
                      style={{ width: "100%", boxSizing: "border-box", padding: "8px 10px", border: `1px solid ${T.line}`, borderRadius: 3, fontFamily: T.body, fontSize: 14 }} />
                  </div>
                  <div><Lbl>Square footage</Lbl><Inp value={deal.sqft} onChange={(v) => D("sqft", v)} suffix="SF" /></div>
                </div>
              </Card>

              {/* step tabs */}
              <div style={{ display: "flex", gap: 4, marginBottom: 14, flexWrap: "wrap" }}>
                {STEPS.map((s, i) => (
                  <button key={s} onClick={() => setStep(i)}
                    style={{ flex: "1 1 auto", padding: "9px 6px", fontFamily: T.disp, fontSize: 13, fontWeight: 600, letterSpacing: "0.05em", textTransform: "uppercase",
                      cursor: "pointer", borderRadius: 3, border: `1px solid ${step === i ? T.ink : T.line}`,
                      background: step === i ? T.ink : "#fff", color: step === i ? "#fff" : T.inkSoft }}>
                    {i + 1}. {s}</button>
                ))}
              </div>

              {step === 0 && (
                <Card title="Step 1 · After Repair Value">
                  <Lbl>What will the property be worth after renovations?</Lbl>
                  <Inp value={deal.arv} onChange={(v) => D("arv", v)} prefix="$" w={260} />
                  <div style={{ marginTop: 8, fontFamily: T.mono, fontSize: 12, color: T.inkSoft }}>
                    {num(deal.sqft) > 0 ? `${fmt(num(deal.arv) / num(deal.sqft), 2)} / SF` : ""}
                  </div>
                </Card>
              )}

              {step === 1 && (
                <Card title="Step 2 · Purchase Price">
                  <Lbl>How much do you anticipate paying?</Lbl>
                  <Inp value={deal.purchase} onChange={(v) => D("purchase", v)} prefix="$" w={260} />
                  <div style={{ marginTop: 8, fontFamily: T.mono, fontSize: 12, color: T.teal, fontWeight: 700 }}>
                    % of ARV: {pct(calc.arv > 0 ? calc.purchase / calc.arv : 0, 2)}
                  </div>
                </Card>
              )}

              {step === 2 && (
                <Card title="Step 3 · Repair Costs">
                  <Toggle value={deal.repairMode} onChange={(v) => D("repairMode", v)}
                    options={[["lump", "Lump Sum"], ["psf", "$ per SF"], ["detailed", "Detailed"]]} />
                  {deal.repairMode === "lump" && (<><Lbl>Total repair costs</Lbl><Inp value={deal.repairLump} onChange={(v) => D("repairLump", v)} prefix="$" w={260} /></>)}
                  {deal.repairMode === "psf" && (
                    <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
                      <div><Lbl>$/SF</Lbl><Inp value={deal.repairPSF} onChange={(v) => D("repairPSF", v)} prefix="$" w={130} /></div>
                      <div><Lbl>Square footage</Lbl><Inp value={deal.sqft} onChange={(v) => D("sqft", v)} suffix="SF" w={150} /></div>
                      <div><Lbl>Total repair costs</Lbl><Inp value={(num(deal.repairPSF) * num(deal.sqft)).toFixed(0)} onChange={() => {}} prefix="$" w={160} disabled /></div>
                    </div>)}
                  {deal.repairMode === "detailed" && (
                    <div>
                      <div style={{ fontFamily: T.mono, fontSize: 22, fontWeight: 700 }}>{fmt(est.grand)}</div>
                      <div style={{ fontSize: 13, color: T.inkSoft, margin: "6px 0 10px" }}>
                        Pulled live from the Repair Estimator ({est.count} line items).</div>
                      <button onClick={() => setView("estimator")}
                        style={{ padding: "9px 16px", background: T.teal, color: "#fff", border: "none", borderRadius: 3, fontFamily: T.disp, fontWeight: 600, letterSpacing: "0.06em", textTransform: "uppercase", cursor: "pointer" }}>
                        Edit detailed estimate</button>
                    </div>)}
                </Card>
              )}

              {step === 3 && (
                <>
                  <Card title="Buying Costs" right={<span style={{ fontFamily: T.mono, fontSize: 14, fontWeight: 700 }}>{fmt(calc.buying)}</span>}>
                    <Toggle value={deal.buyMode} onChange={(v) => D("buyMode", v)} options={[["lump", "Lump Sum"], ["pct", "% of Purchase"]]} />
                    {deal.buyMode === "pct"
                      ? <div style={{ display: "flex", gap: 12 }}><div><Lbl>% of purchase</Lbl><Inp value={deal.buyPct} onChange={(v) => D("buyPct", v)} suffix="%" w={120} /></div></div>
                      : <><Lbl>Total buying costs</Lbl><Inp value={deal.buyLump} onChange={(v) => D("buyLump", v)} prefix="$" w={200} /></>}
                    <div style={{ fontSize: 12, color: T.inkSoft, marginTop: 8 }}>Title, inspections, appraisals — usually 1–3% of purchase.</div>
                  </Card>
                  <Card title="Holding Costs" right={<span style={{ fontFamily: T.mono, fontSize: 14, fontWeight: 700 }}>{fmt(calc.holding)}</span>}>
                    <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 10 }}>
                      <div><Lbl>Renovation period</Lbl><Inp value={deal.renoMonths} onChange={(v) => D("renoMonths", v)} suffix="mo" w={130} /></div>
                      <div><Lbl>Sales period</Lbl><Inp value={deal.salesMonths} onChange={(v) => D("salesMonths", v)} suffix="mo" w={130} /></div>
                      <div><Lbl>Total holding time</Lbl><Inp value={calc.holdMonths} onChange={() => {}} suffix="mo" w={130} disabled /></div>
                    </div>
                    {calc.repair > 0 && (
                      <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap", background: "#FDF3E3", border: "1px solid #F5CBA7", borderRadius: 3, padding: "8px 12px", marginBottom: 10, fontSize: 12.5, color: "#7E5109" }}>
                        <span>RF rule: {fmt(calc.repair)} rehab ≈ <b>{calc.rehabDays} work days</b> ≈ <b>{calc.suggReno} mo</b> renovation.</span>
                        {num(deal.renoMonths) !== calc.suggReno && (
                          <button onClick={() => D("renoMonths", calc.suggReno)}
                            style={{ padding: "4px 12px", borderRadius: 3, border: "none", background: "#E67E22", color: "#fff", cursor: "pointer", fontSize: 12, fontWeight: 700 }}>Apply</button>)}
                      </div>)}
                    <Toggle value={deal.holdMode} onChange={(v) => D("holdMode", v)} options={[["lump", "Lump Sum"], ["permonth", "$ per Month"]]} />
                    {deal.holdMode === "permonth"
                      ? <div><Lbl>$ per month (taxes, utilities, insurance)</Lbl><Inp value={deal.holdPerMonth} onChange={(v) => D("holdPerMonth", v)} prefix="$" w={160} /></div>
                      : <><Lbl>Total holding costs</Lbl><Inp value={deal.holdLump} onChange={(v) => D("holdLump", v)} prefix="$" w={200} /></>}
                  </Card>
                  <Card title="Selling Costs" right={<span style={{ fontFamily: T.mono, fontSize: 14, fontWeight: 700 }}>{fmt(calc.selling)}</span>}>
                    <Toggle value={deal.sellMode} onChange={(v) => D("sellMode", v)} options={[["lump", "Lump Sum"], ["pct", "% of Resale"]]} />
                    {deal.sellMode === "pct"
                      ? <div><Lbl>% of resale (commissions + closing)</Lbl><Inp value={deal.sellPct} onChange={(v) => D("sellPct", v)} suffix="%" w={120} /></div>
                      : <><Lbl>Total selling costs</Lbl><Inp value={deal.sellLump} onChange={(v) => D("sellLump", v)} prefix="$" w={200} /></>}
                  </Card>
                </>
              )}

              {step === 4 && (
                <Card title="Step 5 · Financing" right={<span style={{ fontFamily: T.mono, fontSize: 14, fontWeight: 700 }}>{fmt(calc.financing)}</span>}>
                  <Toggle value={deal.finStrategy} onChange={(v) => D("finStrategy", v)} options={[["cash", "Cash Purchase"], ["loan", "Loan"]]} />
                  {deal.finStrategy === "loan" && (
                    <>
                      <Lbl>Loan amount basis</Lbl>
                      <Toggle value={deal.loanBasis} onChange={(v) => D("loanBasis", v)}
                        options={[["lump", "Lump Sum"], ["purchase", "Purchase"], ["repairs", "Repairs"], ["both", "Purchase & Repairs"], ["arv", "ARV"]]} />
                      <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 14 }}>

                    <div style={{ fontWeight: 600, fontSize: 14 }}>{p.name}</div>
                    <div style={{ fontFamily: T.mono, fontSize: 11.5, color: T.inkSoft }}>
                      ARV {fmt(num(p.deal.arv))} · saved {new Date(p.savedAt).toLocaleDateString()}</div>
                  </div>
                  <button onClick={() => loadDeal(p)} style={{ padding: "7px 14px", borderRadius: 3, border: "none", background: T.teal, color: "#fff", cursor: "pointer", fontFamily: T.disp, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.05em", fontSize: 12 }}>Load</button>
                  <button onClick={() => deleteDeal(p.name)} style={{ padding: "7px 12px", borderRadius: 3, border: `1px solid ${T.red}`, background: "#fff", color: T.red, cursor: "pointer", fontSize: 12, fontWeight: 600 }}>Delete</button>
                </div>
              ))}
            </Card>
            </>
          )}
        </div>

        {/* ============ RIGHT: live ledger ============ */}
        <div className="no-print" style={{ flex: "0 1 340px", minWidth: 300, position: "sticky", top: 16 }}>
          {/* verdict stamp */}
          {(() => {
            const vColor = calc.verdict === "clears" ? T.green : calc.verdict === "thin" ? T.amber : T.red;
            const vText = calc.verdict === "clears" ? "✓ Clears Floor" : calc.verdict === "thin" ? "⚠ Thin — Storm Risk" : "✕ Below Floor";
            const vSub = calc.verdict === "clears" ? "clears target and survives the perfect storm"
              : calc.verdict === "thin" ? `hits ${fmt(calc.baseTarget)} target, but perfect storm dips under ${fmt(calc.stormFloor)}`
              : `needs ${fmt(calc.baseTarget)} — greater of $50K or 20% of ARV`;
            return (
              <div style={{ background: T.panel, border: `3px solid ${vColor}`, borderRadius: 4, padding: "14px 16px", marginBottom: 12, textAlign: "center" }}>
                <div style={{ fontFamily: T.disp, fontSize: 22, fontWeight: 700, letterSpacing: "0.12em", textTransform: "uppercase", color: vColor }}>{vText}</div>
                <div style={{ fontFamily: T.mono, fontSize: 11, color: T.inkSoft, marginTop: 3 }}>{vSub}</div>
                <div style={{ fontFamily: T.mono, fontSize: 10.5, color: T.inkSoft, marginTop: 2 }}>
                  target {fmt(calc.baseTarget)} · storm floor {fmt(calc.stormFloor)}{calc.allIn > 250000 ? " · all-in > $250K" : ""}</div>
              </div>);
          })()}

          <div style={{ background: T.panel, border: `1px solid ${T.line}`, borderRadius: 4, padding: 16 }}>
            <div style={{ fontFamily: T.disp, fontSize: 15, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", borderBottom: `2px solid ${T.ink}`, paddingBottom: 6, marginBottom: 8 }}>
              Live Deal Ledger</div>
            <Row label="After Repair Value" val={fmt(calc.arv)} />
            <Row label="Purchase Costs" val={"-" + fmt(calc.purchase)} />
            <Row label="Repair Costs" val={"-" + fmt(calc.repair)} />
            <Row label="Buying Costs" val={"-" + fmt(calc.buying)} />
            <Row label="Holding Costs" val={"-" + fmt(calc.holding)} />
            <Row label="Selling Costs" val={"-" + fmt(calc.selling)} />
            <Row label="Financing Costs" val={"-" + fmt(calc.financing)} />
            <Row label="Profit" val={fmt(calc.profit)} bold color={calc.profit >= 0 ? T.green : T.red} />
            <div style={{ height: 10 }} />
            <Row label="Profit % of ARV" val={pct(calc.arv > 0 ? calc.profit / calc.arv : 0, 2)} sub />
            <Row label="70% Rule (Purch+Repair)/ARV" val={pct(calc.rule70, 1)} sub color={calc.rule70 <= 0.7 ? T.green : T.amber} />
            <Row label="Total loan funding" val={fmt(calc.loan)} sub />
            <Row label="Cash needed" val={fmt(calc.cashNeeded)} sub />
            <Row label="COCR" val={isFinite(calc.cocr) ? pct(calc.cocr, 1) : "all-cash n/a"} sub />
            <Row label="Annualized COCR" val={isFinite(calc.annCocr) ? pct(calc.annCocr, 1) : "—"} sub />
            <Row label="Timeline" val={calc.holdMonths + " months"} sub />
            <Row label="Max purchase @ desired profit" val={fmt(calc.mao)} sub color={T.teal} />

            <div style={{ marginTop: 14, display: "flex", gap: 8 }}>
              <input value={saveName} onChange={(e) => setSaveName(e.target.value)} placeholder={deal.address || "Deal name"}
                style={{ flex: 1, minWidth: 0, padding: "8px 10px", border: `1px solid ${T.line}`, borderRadius: 3, fontSize: 13 }} />
              <button onClick={saveDeal}
                style={{ padding: "8px 16px", borderRadius: 3, border: "none", background: T.ink, color: "#fff", cursor: "pointer", fontFamily: T.disp, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em", fontSize: 12 }}>Save deal</button>
            </div>
            <button onClick={() => setView("review")}
              style={{ marginTop: 8, width: "100%", padding: "10px 16px", borderRadius: 3, border: "none", background: T.teal, color: "#fff", cursor: "pointer", fontFamily: T.disp, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em", fontSize: 13 }}>
              Review Full Analysis →</button>
          </div>

          {view === "estimator" && (
            <div style={{ background: T.ink, color: "#fff", borderRadius: 4, padding: 16, marginTop: 12 }}>
              <div style={{ fontFamily: T.disp, fontSize: 14, letterSpacing: "0.1em", textTransform: "uppercase", color: "#9FB2C1" }}>Estimate Grand Total</div>
              <div style={{ fontFamily: T.mono, fontSize: 30, fontWeight: 700 }}>{fmt(est.grand)}</div>
              <div style={{ fontFamily: T.mono, fontSize: 12, color: "#B9C7D3", marginTop: 4 }}>
                Labor {fmt(est.labor)} · Mat'l {fmt(est.material)}<br />
                Subtotal {fmt(est.subtotal)} + Adders {fmt(est.adderAmt)}<br />
                {num(deal.sqft) > 0 ? fmt(est.grand / num(deal.sqft), 2) + " / SF · " : ""}{est.count} line items</div>
            </div>)}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
